name: PR Review Thread Auto Resolver

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:
    inputs:
      pull_number:
        description: 'PR number to resolve outdated threads for'
        required: true
        type: number

permissions:
  pull-requests: write

concurrency:
  group: pr-review-thread-auto-resolver-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-threads:
    runs-on: ubuntu-latest
    environment: copilot
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find open PR for this branch
        id: find-pr
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const isManual = context.eventName === 'workflow_dispatch';
            if (isManual) {
              const pull_number = Number(context.payload.inputs.pull_number);
              core.setOutput('pull_number', pull_number);
              core.setOutput('found', 'true');
              core.info(`Manual trigger: using PR #${pull_number}`);
              return;
            }

            const branch = context.ref.replace('refs/heads/', '');
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
            });

            if (prs.length === 0) {
              core.info(`No open PR found for branch: ${branch}. Skipping.`);
              core.setOutput('found', 'false');
              return;
            }

            const pr = prs[0];
            core.info(`Found open PR #${pr.number}: ${pr.title}`);
            core.setOutput('pull_number', pr.number);
            core.setOutput('found', 'true');

      - name: Resolve outdated review threads
        if: steps.find-pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          PR="${{ steps.find-pr.outputs.pull_number }}"
          echo "Resolving outdated threads for PR #${PR}..."
          bash .codex/skills/github-pr-review-thread-resolver/scripts/resolve_review_threads.sh \
            "${{ github.repository }}" \
            "${PR}" \
            --mode outdated

      - name: Emit summary
        if: always()
        run: |
          echo "PR=${{ steps.find-pr.outputs.pull_number }}"
          echo "BRANCH=${{ github.ref_name }}"
          echo "EVENT=${{ github.event_name }}"
