name: PR Frontend E2E

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: pr-frontend-login-e2e-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  login-chat-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            apps/node_backend/package-lock.json
            apps/web_chat_app/package-lock.json

      - name: Install backend dependencies
        working-directory: apps/node_backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: apps/web_chat_app
        run: npm ci

      - name: Install E2E dependencies
        run: |
          npm install --no-save playwright wait-on
          npx playwright install chromium --with-deps

      - name: Start backend API server
        env:
          TURSO_DATABASE_URL: file:/tmp/bricks-e2e.db
          JWT_SECRET: e2e_jwt_secret_please_change_for_production_only
          ENCRYPTION_KEY: e2e_encryption_key_please_change_for_production_only
          E2E_MOCK_GITHUB_OAUTH: 'true'
          E2E_MOCK_GITHUB_EMAIL: e2e-user@bricks.local
          GITHUB_CALLBACK_URL: http://127.0.0.1:3000/api/auth/github/callback
          OAUTH_ALLOWED_RETURN_ORIGINS: http://127.0.0.1:4173
          NODE_ENV: test
        run: npm run dev --prefix apps/node_backend > /tmp/node-backend.log 2>&1 &

      - name: Start frontend dev server
        env:
          VITE_API_PROXY_TARGET: http://127.0.0.1:3000
        run: npm run dev --prefix apps/web_chat_app -- --host 127.0.0.1 --port 4173 --strictPort > /tmp/web-chat-app.log 2>&1 &

      - name: Wait for local services
        run: |
          npx wait-on http://127.0.0.1:3000/api/health --timeout 180000
          npx wait-on http://127.0.0.1:4173 --timeout 180000

      - name: Run login-to-chat E2E and take screenshot
        env:
          E2E_BASE_URL: http://127.0.0.1:4173
        run: node .github/scripts/e2e_login_chat.js

      - name: Upload service logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-service-logs-${{ github.event.pull_request.number || github.run_number }}
          path: |
            /tmp/node-backend.log
            /tmp/web-chat-app.log
          retention-days: 7

      - name: Upload chat screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-chat-screenshot-${{ github.event.pull_request.number || github.run_number }}
          path: screenshots/chat-after-login.png
          retention-days: 7

      - name: Publish screenshot to PR comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        env:
          GITHUB_TOKEN: ${{ secrets.CRAZYGO_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: node .github/scripts/publish_pr_chat_e2e_screenshot.js
