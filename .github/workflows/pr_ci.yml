name: PR CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Bootstrap workspace with Melos
        run: |
          cd "$GITHUB_WORKSPACE"
          dart pub global activate melos
          export PATH="$HOME/.pub-cache/bin:$PATH"
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
          melos bootstrap

      - name: Run code analysis
        run: |
          cd "$GITHUB_WORKSPACE"
          melos analyze

  test:
    runs-on: ubuntu-latest
    needs: analyze

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Bootstrap workspace with Melos
        run: |
          cd "$GITHUB_WORKSPACE"
          dart pub global activate melos
          export PATH="$HOME/.pub-cache/bin:$PATH"
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
          melos bootstrap

      - name: Run unit tests
        run: |
          cd "$GITHUB_WORKSPACE"
          melos test -- --exclude-tags=integration

      - name: Log test results
        if: always()
        run: |
          echo "Tests completed"
          echo "Check test output above for results"
