version: 1
map_type: feature_map
owner: bricks
last_updated: 2026-04-29
purpose: >
  为人类测试员和 AI 测试员提供产品功能清单与进入路径，作为回归测试与变更影响评估的入口索引。

products:
  - product_id: mobile_chat_app
    name: Mobile Chat App
    platform:
      - flutter_mobile
      - flutter_web
    entry_points:
      - path: apps/mobile_chat_app/lib/main.dart
        route: App root
    features:
      - feature_id: auth_login
        name: GitHub OAuth 登录
        user_value: 用户可完成登录并进入应用。
        entry_paths:
          - screen: LoginScreen
            route_hint: apps/mobile_chat_app/lib/features/auth/login_screen.dart
          - service: GitHubOAuth/AuthService
            route_hint: apps/mobile_chat_app/lib/features/auth/
        smoke_checks:
          - Web 打开登录页并发起 GitHub 登录。
          - iOS release 点击 GitHub 登录时默认应打开 `https://bricks.askman.dev` 上的后端 OAuth 授权页。
          - iOS OAuth 完成后通过 `bricks://auth/github/callback` 回到应用。
          - 完成 token 回调后进入主界面。

      - feature_id: chat_session
        name: 多 Agent 聊天会话
        user_value: 用户可在会话中发送消息并观察 Agent 协同回复。
        entry_paths:
          - screen: ChatScreen
            route_hint: apps/mobile_chat_app/lib/features/chat/chat_screen.dart
          - navigation: ChatNavigationPage
            route_hint: apps/mobile_chat_app/lib/features/chat/chat_navigation_page.dart
        smoke_checks:
          - 发送一条消息后可以看到消息列表更新。
          - 将路由切到 openclaw 后发送消息，在插件离线时应呈现“已发送但未完成（未读）”。
          - 启动并配置 openclaw 插件后再次发送，消息应完成并出现 assistant 回复。
          - 当用户拥有多个 OpenClaw 节点时，输入框左侧路由菜单应仅列出真实节点；菜单主标题显示节点名称，副标题显示 `OpenClaw`。
          - 当已保存的 OpenClaw `nodeId` 对应节点已被删除时，聊天页与发送行为应回退到 `Bricks Default`，而不是改投递到其他 OpenClaw 节点。
          - 在聊天页选择某个 OpenClaw 节点后发送消息时，仅所选节点应收到并回复；同用户其他节点不应重复消费同一条消息。
          - 从设置页新增或重命名节点后返回聊天页，路由菜单中的 OpenClaw 节点列表应刷新为最新状态。
          - 在 openclaw 离线后切回默认路由继续发送时，历史消息应优先按服务端 seqId（不可变插入序）渲染，后到达更新不会打乱对话先后。
          - 当多条消息 createdAt 相同（秒级碰撞）时，消息应按 seqId 稳定从旧到新渲染。
          - 当 writeSeq 因更新语义与原始对话顺序冲突时，列表仍应按 seqId 保持“先问后答”。
          - default 与 openclaw 路由均通过 `/api/chat/respond` 先入库 user query 并返回 async accepted，再由后台异步写入 assistant 回复。
          - 发送后 user query 仍先显示“已接受”状态；assistant 身份占位可在 SSE dispatch 占位到达时提前出现，但 assistant 正文气泡仍应等待真实内容开始到达。
          - user query 气泡应显示两段状态：入库后先显示第一枚 ✓；AI 开始回复后显示第二枚状态，default/其他远端为第二枚 ✓，openclaw 为单色路由状态图标。
          - user query 的时间/线程与投递状态应显示在气泡内；长按气泡可弹出“复制/分叉（待开发）/重发（待开发）”菜单，并在底部显示 message id 与 task id。
          - 发送消息后，user query 由后端 /respond 端点统一持久化；前端不执行独立入库请求。
          - 发送消息后，最新 user 消息会定位在可见区域首条，assistant 回复显示在其后。
          - 打开或切换到已有历史的会话后，列表按“最新 user 消息优先”定位而非强制到底部。
          - 当向上浏览历史消息后，输入框上方应出现向下箭头按钮；点击后应快速跳转到最新消息。
          - 刷新页面后，已发送过消息的频道仍会在侧边栏中显示并可继续会话。
          - 新建频道时必须输入频道名，且重复名称会被拦截。
          - 长按非默认频道会出现“改名/归档”菜单；归档后频道从列表中隐藏。
          - 长按频道改名后刷新页面，频道名称应保持为用户设置值（由数据库映射恢复）。
          - 侧边栏频道列表与顶部频道下拉菜单均按最新消息时间降序排列；有消息记录的频道排在无消息频道前面；默认频道参与排序，不固定置顶；时间相同时按 id 字典序确定顺序。
          - 顶部标题显示当前频道名且左对齐。
          - 切换 Agent 后仍可继续会话。
          - 首次安装且未创建自定义 Agent 时，侧边栏 Agents 分组应默认显示内建 Agent 列表（不为空）。
          - 侧边栏应在 Agents 分组上方显示 Skills 分组；当前内容为空并显示“待实现”占位。
          - 深色紧凑布局下侧边栏应使用黑色背景并展开为全屏宽度；深色宽屏布局下侧边栏应使用黑色背景并固定为约 260px 宽，与主聊天画布形成层级色差。
          - 宽屏下点击左上角导航按钮后，侧边导航应以内联侧栏展开并与右侧对话区共存；再次点击后侧栏隐藏。
          - 侧边栏 Agents 列表中，内建 Agent 需显示只读标识，自定义 Agent 可显示自定义描述。
          - 侧边栏 Agents 分组标题右侧不应出现“配置”按钮。
          - 点击任一侧边栏 Agent 后应进入 Prompt 详情页，且底部应提供“修改配置”“发起对话”两个按钮。
          - 在 Prompt 详情页点击“修改配置”后，应进入 Agent 管理流程。
          - 在 Prompt 详情页点击“发起对话”后，应将该 Agent 设为当前会话 Agent。
          - 输入框不再支持 `@agent` 文本补全；当路由为默认路由时，`@` 按钮显示在路由按钮右侧、配置按钮左侧，点击后下拉展示与侧边栏 Agents 分组一致的 Agent 列表。
          - 当路由为 OpenClaw 时，`@` 按钮同样可点击并弹出下拉菜单；菜单应展示匹配 OpenClaw node 上报的 agents，选择后将 `@agentId` 插入输入框。
          - 对话页顶部不再显示横向“参与者/Agent 概率”指示条。
          - 从输入框左下角菜单点击“信息”后可看到调试信息弹窗。
          - 当路由为默认路由时，输入框左下角应显示配置按钮，且“模型”项副标题展示当前生效模型名。
          - 当路由为 OpenClaw 时，输入框左下角应额外出现 `/` 斜杠命令按钮，选择命令后应自动填充到输入框。
          - 未来新增的非默认且非 OpenClaw 路由在未适配前，默认不显示配置按钮。
          - 顶部频道名称应支持下拉切换频道，切换后分区标签与分区列表需同步刷新为目标频道的数据。
          - 频道名称右侧应内嵌分区下拉按钮（显示当前分区名+下箭头），且该菜单与频道标题左对齐，不再使用右上角三个点。
          - 分区菜单应先显示功能组（新建子区、分区改名未实现、分区存档未实现），再以分割线分隔后显示分区列表组（主区+已有子区）；菜单弹出动画应保持快速缩放+淡入。
          - 在主区（channel 对话）打开路由菜单时，不应显示 Thread router 分组；在子区（thread 对话）应显示 Follow channel / Bricks Default / OpenClaw 三项。
          - Openclaw 异步会话空闲时，客户端应通过 SSE（`/api/chat/events/:sessionId`）保持持久推送连接，服务端将在新消息到达后实时推送事件，无需客户端反复轮询。
          - 深色主题下应采用低亮度灰阶 surface；用户消息气泡不得使用品牌 primary 色。
          - 深色紧凑布局应呈现“黑色页面背景 + 近黑输入框”的层级；深色宽屏布局应呈现“近黑页面背景 + elevated 输入框”的层级。
          - 对话输入框获得焦点时不应切换为高亮边框，应保持与未聚焦状态一致的安静边框。
          - Markdown/code 内容块应保持 embedded/recessed surface 层级，而不是使用输入框的 elevated surface。
          - 输入框底部动作按钮默认应为白灰层级；发送按钮仅在输入非空时进入高亮激活态。
          - 输入框底部可点击且非禁用的动作按钮（路由、`/`、`@`、配置、发送）应使用一致的白色系 enabled 颜色，除非该状态刻意使用 accent。
          - OpenClaw 路由与投递状态图标应使用单色图标，不使用彩色 emoji。
          - 用户消息与 assistant 消息正文应共享同一文本样式基线（字号一致）；时间/thread 等 meta 信息应统一为次级灰。

      - feature_id: model_settings
        name: 模型与提供商配置
        user_value: 用户可选择可用模型并保存默认配置，并可快速复制 API URL 与 API Key。
        entry_paths:
          - screen: ModelSettingsScreen
            route_hint: apps/mobile_chat_app/lib/features/settings/model_settings_screen.dart
          - service: LlmConfigService
            route_hint: apps/mobile_chat_app/lib/features/settings/llm_config_service.dart
        smoke_checks:
          - 进入模型设置并保存配置。
          - 重新进入页面后配置保持一致。
          - 点击 Base URL 右侧复制按钮后可复制 API URL。
          - 点击 API Key 右侧复制按钮时，非空 key 可被复制，空值会提示不可复制。

      - feature_id: node_settings
        name: Node management and node-scoped token
        user_value: Users can manage nodes and generate reusable OpenClaw installation tokens from each node entry.
        entry_paths:
          - screen: SettingsScreen
            route_hint: apps/mobile_chat_app/lib/features/settings/settings_screen.dart
          - screen: NodeSettingsScreen
            route_hint: apps/mobile_chat_app/lib/features/settings/node_settings_screen.dart
          - service: LlmConfigService.fetchPlatformNodes/createPlatformNode/renamePlatformNode/fetchPlatformToken(nodeId)
            route_hint: apps/mobile_chat_app/lib/features/settings/llm_config_service.dart
          - route: /api/config/nodes
            route_hint: apps/node_backend/src/routes/config.ts
          - route: /api/config/platform-token?nodeId=...
            route_hint: apps/node_backend/src/routes/config.ts
        smoke_checks:
          - Settings shows a single "Node Management" entry and no separate Openclaw Token entry.
          - Add-node action is displayed in the AppBar top-right using icon + text.
          - When no node exists, the page shows a "Create First Node" button.
          - Each node supports rename, plugin-id copy, and token generation for OpenClaw installation.
          - 节点创建后可展示默认名称（openclaw 1 / openclaw 2 ...）并支持重命名。
          - 每个节点可复制 plugin id，可为该节点生成 token 与只写入 `channels.dev-askman-bricks` 的 OpenClaw CLI 配置命令。
          - 点击“复制 OpenClaw 命令”后，剪贴板内容可直接粘贴到 shell 执行，并包含 base URL / plugin id / platform token / validate / gateway restart / inspect。
          - 使用指定 nodeId 请求 platform-token 时，返回 payload 包含 nodeId / nodeName / pluginId / token。

      - feature_id: workspace_resources
        name: Workspace / Projects / Skills / Resources 管理
        user_value: 用户可浏览工作区相关资源。
        entry_paths:
          - screen: WorkspaceScreen
            route_hint: apps/mobile_chat_app/lib/features/workspace/workspace_screen.dart
          - screen: ProjectsScreen
            route_hint: apps/mobile_chat_app/lib/features/projects/projects_screen.dart
          - screen: SkillsScreen
            route_hint: apps/mobile_chat_app/lib/features/skills/skills_screen.dart
          - screen: ResourcesScreen
            route_hint: apps/mobile_chat_app/lib/features/resources/resources_screen.dart
        smoke_checks:
          - 从侧边导航进入每个页面。
          - 页面可正常渲染且无崩溃。

  - product_id: node_backend
    name: Node Backend API
    platform:
      - nodejs
      - vercel
    entry_points:
      - path: apps/node_backend/src/index.ts
        route: API root
    features:
      - feature_id: backend_auth
        name: 认证与回跳控制
        user_value: API 请求可被认证并处理回跳逻辑。
        entry_paths:
          - route: /api/auth/github
            route_hint: apps/node_backend/src/routes/auth.ts
          - route: /api/auth/github/callback
            route_hint: apps/node_backend/src/routes/auth.ts
          - route: /api/auth/me
            route_hint: apps/node_backend/src/routes/auth.ts
        smoke_checks:
          - 未登录请求返回预期状态码。
          - 合法回跳参数通过校验。
          - 仅允许受控 native OAuth callback，拒绝任意自定义 scheme 回跳。

      - feature_id: backend_chat_llm
        name: Chat 与 LLM 调用
        user_value: 服务端可处理聊天请求并路由到模型提供商，并向远端小龙虾/OpenClaw 提供 pull-only 平台接口。
        entry_paths:
          - route: /api/chat
            route_hint: apps/node_backend/src/routes/chat.ts
          - route: /api/llm
            route_hint: apps/node_backend/src/routes/llm.ts
          - route: /api/v1/platform/*
            route_hint: apps/node_backend/src/routes/platform.ts
          - route: /api/config/platform-token
            route_hint: apps/node_backend/src/routes/config.ts
          - service: LlmService
            route_hint: apps/node_backend/src/llm/llm_service.ts
        smoke_checks:
          - 调用 chat 接口时返回结构化响应。
          - provider 配置缺失时给出明确错误。
          - '使用 API Key + X-Bricks-Plugin-Id 可访问 /api/v1/platform/events 并获取 nextCursor。'
          - '使用 `/api/chat/scope-settings` 为 openclaw 路由保存 nodeId 后，再读取应返回同一 nodeId。'
          - '同一用户存在多个 OpenClaw 节点时，`/api/chat/respond` 为消息写入目标节点 metadata 后，仅目标 plugin 可从 `/api/v1/platform/events` 读到该消息。'
          - '非目标 plugin 对其他 plugin 创建的 assistant message 执行 PATCH 时，应返回 403。'
          - '/api/v1/platform/events/ack 禁止 body 中传 pluginId，合法 ACK 可重复调用并返回成功。'
          - '/api/config/nodes/:nodeId/agents?sourcePlatform=openclaw 在请求时即时执行 OpenClaw CLI 查询 agents，并用于 OpenClaw router 的 @ 下拉菜单。'
          - '调用 /api/chat/channel-names 可保存并读取每个用户的频道自定义名称。'
          - '使用 /api/config/nodes 创建多个节点后，不同节点的 token 应绑定不同 pluginId。'
          - '/api/v1/platform/messages 写入后，消息 metadata 应包含 nodeId/nodeName（当 pluginId 可映射到节点）。'
          - '高频访问 `/api/config?category=llm` 不应因应用层全局 IP 限流触发 429。'
          - '`/api/config` 写操作在同一用户维度超过每分钟预算时返回 429。'

  - product_id: node_openclaw_plugin
    name: Node OpenClaw Plugin
    platform:
      - nodejs
    entry_points:
      - path: apps/node_openclaw_plugin/src/index.ts
        route: plugin runtime main
    features:
      - feature_id: node_openclaw_pull_loop
        name: OpenClaw Pull-only 插件运行时与 Onboarding 配置
        user_value: 远端插件可在 OpenClaw onboarding 中完成 channel 配置，并轮询 Bricks 平台事件执行 ACK 与消息回写闭环。
        entry_paths:
          - setup: onboarding.configureInteractive
            route_hint: apps/node_openclaw_plugin/src/openclawExtension.ts
          - manifest: channelConfigs.dev-askman-bricks
            route_hint: apps/node_openclaw_plugin/openclaw.plugin.json
          - runtime: NodeOpenClawPluginRunner
            route_hint: apps/node_openclaw_plugin/src/pluginRunner.ts
          - client: PlatformClient
            route_hint: apps/node_openclaw_plugin/src/platformClient.ts
          - state: FileStateStore
            route_hint: apps/node_openclaw_plugin/src/stateStore.ts
        smoke_checks:
          - 安装插件后执行 `openclaw onboard` 可提示输入 BRICKS_BASE_URL / BRICKS_PLUGIN_ID / BRICKS_PLATFORM_TOKEN 并写入 `channels.dev-askman-bricks`。
          - 设置 BRICKS_BASE_URL / BRICKS_PLATFORM_TOKEN / BRICKS_PLUGIN_ID 后可启动插件轮询。
          - 非 JWT token 或 claims 不完整时插件启动应失败（JWT-only）。
          - 插件可调用 `/api/v1/platform/events` 拉取事件并以 `X-Bricks-Plugin-Id` 发送请求。
          - 插件启动时可通过 `openclaw agents list --json` 抓取 OpenClaw agents 并上报到 Bricks platform。
          - 插件 ACK body 仅包含 `cursor` 与 `ackedEventIds` 且可推进本地 cursor。
          - 收到 `message.created` 事件后可执行 create + patch 消息回写。

  - product_id: docs_site
    name: Docusaurus Docs Site
    platform:
      - nodejs
      - docusaurus
      - vercel-static
    entry_points:
      - path: apps/docs_site/docusaurus.config.ts
        route: /docs/
      - path: vercel.json
        route: rewrite /docs/*
      - path: tools/vercel-build.sh
        route: build/web/docs artifact assembly
    features:
      - feature_id: docs_site_hosting
        name: Docusaurus 文档子路径挂载
        user_value: 用户可通过 `/docs/` 访问文档站点，并与 Flutter Web 主站共用同一域名部署。
        entry_paths:
          - route: /docs/
            route_hint: apps/docs_site/docusaurus.config.ts
          - route: /docs/:path*
            route_hint: vercel.json
        smoke_checks:
          - 执行 `DOCS_URL=http://localhost:3000 DOCS_BASE_URL=/docs/ npm run build` 后，docs 输出可被 `/docs/` 前缀访问。
          - 执行 `bash ./tools/vercel-build.sh` 后，`apps/mobile_chat_app/build/web/docs/index.html` 存在。
          - 本地静态服务访问 `/docs/` 呈现 Docusaurus 页面，访问 `/` 仍呈现 Flutter Web 首页。
