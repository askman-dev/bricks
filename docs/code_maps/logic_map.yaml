version: 1
map_type: logic_map
owner: bricks
last_updated: 2026-04-09
purpose: >
  为人类测试员、AI 测试员与 AI 工程师提供“功能 -> 代码/文档/关键词”映射，
  用于影响面分析、回归测试设计与遗留逻辑清理。

index:
  - feature_id: auth_login
    capability: GitHub OAuth 登录
    code_index:
      - apps/web_chat_app/src/App.tsx
      - apps/web_chat_app/src/lib/api.ts
      - apps/node_backend/src/routes/auth.ts
    doc_index:
      - docs/architecture.md
      - BUILD.md
    test_index:
      - apps/web_chat_app/src/__tests__/app.test.tsx
      - apps/node_backend/src/routes/auth.test.ts
    keywords:
      - oauth
      - github
      - auth
      - login
      - react
    change_risks:
      - OAuth 登录后前端状态刷新失败会导致用户停留在登录页。
      - Cookie/credentials 配置不一致会导致 /api/auth/me 鉴权失败。

  - feature_id: chat_session
    capability: React 聊天会话
    code_index:
      - apps/web_chat_app/src/pages/ChatPage.tsx
      - apps/web_chat_app/src/lib/api.ts
      - apps/node_backend/src/routes/chat.ts
      - apps/node_backend/src/llm/llm_service.ts
    doc_index:
      - docs/architecture.md
    test_index:
      - apps/web_chat_app/src/__tests__/app.test.tsx
    keywords:
      - chat
      - session
      - react
      - respond
      - message
    change_risks:
      - 请求体字段缺失将触发后端 400 并导致发送失败。
      - 前端会话 ID 策略变动可能影响后端历史聚合。

  - feature_id: mobile_navigation_shell
    capability: 移动端导航与设置入口
    code_index:
      - apps/web_chat_app/src/App.tsx
      - apps/web_chat_app/src/pages/ChatPage.tsx
      - apps/web_chat_app/src/pages/SettingsPage.tsx
      - apps/web_chat_app/src/pages/ModelSettingsPage.tsx
      - apps/web_chat_app/src/styles.css
    doc_index:
      - docs/architecture.md
      - docs/reviews/2026-04-09-main-worktree-functional-gap-analysis.md
    test_index:
      - apps/web_chat_app/src/__tests__/app.test.tsx
    keywords:
      - mobile
      - topbar
      - menu
      - settings
      - drawer
      - overlay
      - subsection
    change_risks:
      - 抽屉菜单与 composer/section 菜单状态耦合时，可能出现误触发错误菜单。
      - 浮层定位与层级错误会导致菜单遮挡或不可点击。
      - 主区数据读取失败会导致 channelId 退化为默认值并影响会话隔离。
      - 顶部导航按钮文案或可访问名称变更会破坏自动化测试选择器。

  - feature_id: backend_auth
    capability: 后端 GitHub OAuth 认证
    code_index:
      - apps/node_backend/src/routes/auth.ts
      - apps/node_backend/src/routes/auth_return_to.ts
      - apps/node_backend/src/middleware/auth.ts
      - apps/node_backend/src/services/userService.ts
      - apps/node_backend/src/services/oauthStateService.ts
    doc_index:
      - docs/architecture.md
    test_index:
      - apps/node_backend/src/routes/auth.test.ts
    keywords:
      - oauth
      - github
      - callback
      - return_to
      - jwt
      - token
    change_risks:
      - OAuth state 校验逻辑变动可能导致回调失效。
      - return_to 校验规则变动可能引入开放重定向漏洞。

  - feature_id: backend_chat_llm
    capability: 后端聊天与 LLM 路由
    code_index:
      - apps/node_backend/src/routes/chat.ts
      - apps/node_backend/src/routes/llm.ts
      - apps/node_backend/src/llm/llm_service.ts
      - apps/node_backend/src/llm/providers/anthropic_adapter.ts
      - apps/node_backend/src/llm/providers/google_ai_studio_adapter.ts
    doc_index:
      - docs/architecture.md
    test_index: []
    keywords:
      - chat
      - llm
      - provider
      - stream
      - anthropic
      - google
    change_risks:
      - provider 适配器接口变动导致 LLM 调用失败。
      - 流式响应格式变化导致前端解析出错。

maintenance_rules:
  update_required_when:
    - 新增、删除或重命名用户可见功能入口。
    - 关键逻辑文件、测试文件、文档索引发生变化。
    - AI Agent 修改后出现遗留逻辑或潜在回归风险。
  review_checklist:
    - feature_id values in feature_map must match those in logic_map.
    - When a feature spans multiple platforms (web/backend), the feature_id naming should clearly indicate the scope.
    - Each capability must have at least code_index and keywords.
    - Every change should include change_risks to assist future regression testing.
