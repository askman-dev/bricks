    change_risks:
      - 改动路由或拓扑后，消息分发链路中断。
      - 会话持久化字段升级时出现向后兼容问题。
      - 消息列表滚动锚点从“底部”改为“用户消息”后，若触发条件错误会导致上下文定位错位。
      - 长文本折叠状态与流式更新叠加时，可能出现按钮闪烁或展开状态丢失。
      - 菜单动画时长或曲线调整不当可能导致菜单响应突兀或视觉跳变。
      - 标题区子区切换与右上角管理菜单职责若混淆，可能导致用户误触或切换不可达。
      - 频道重命名与新建时若未统一大小写/空白策略，可能出现“看似重复”名称并影响切换。
      - 异步路由（如 OpenClaw）与默认路由混用时，若排序键选错（例如把可变写入游标当作时间序）可能导致历史消息时序错乱。
      - 当多条消息 createdAt 相同且缺少 seqId/稳定并列键时，可能出现“新消息插到旧消息上方”的顺序抖动。
      - 当 writeSeq 与 seqId 语义混用，或 createdAt 来自不同时区来源时，会出现“回复跑到提问前”的错位。
      - user 气泡投递状态若未按路由类型区分（default/openclaw/其他远端），会导致状态图标误导用户。
      - 若 default `/chat/respond` 回退为同步阻塞路径，会导致“先入库再异步回复”契约失效并放大接口延迟。
      - 若前端继续渲染空 assistant 占位，用户会误判 AI 已开始回复并干扰两段状态图标语义。
      - 若前端回退到“全量重放 upsert”，会再次引入 write_seq 噪声推进与重复写入风险。
      - channel 会话若错误暴露 thread 路由菜单，用户可能误写 thread scope 配置并造成路由预期不一致。
      - 若未按路由动态切换输入框左下角动作按钮，可能出现默认路由缺少模型入口或 OpenClaw 无法快捷注入斜杠命令的问题。
      - 长轮询 waitMs 设置过高且缺少超时保护时，可能导致连接堆积并放大服务端资源占用。
      - 内建 Agent 与自定义 Agent 合并策略若处理不当，可能导致同名覆盖异常或列表顺序不稳定。
      - 若将 `@` 提及能力从输入框迁移到路由指示时未同步文案/可见性规则，用户可能误解当前路由状态。
      - Agent 详情页“修改配置/发起对话”回调若未正确关闭抽屉与路由跳转，可能出现重复页面栈或会话 Agent 未更新。

