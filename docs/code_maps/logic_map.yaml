    change_risks:
      - 改动路由或拓扑后，消息分发链路中断。
      - 会话持久化字段升级时出现向后兼容问题。
      - channel/thread scope 的 nodeId 持久化若与当前路由状态不同步，可能导致消息投递到错误节点。
      - 消息列表滚动锚点从“底部”改为“用户消息”后，若触发条件错误会导致上下文定位错位。
      - 长文本折叠状态与流式更新叠加时，可能出现按钮闪烁或展开状态丢失。
      - 菜单动画时长或曲线调整不当可能导致菜单响应突兀或视觉跳变。
      - 设计系统 token 文档与 `AppColors` / `ChatColors` 映射不一致时，后续 UI 变更可能重新引入一次性颜色或冗余组件 token。
      - 侧边栏宽度或背景色若与 chat surface 层级脱节，宽屏下会丢失导航层与主画布的视觉分离。
      - 如果抽屉式导航与宽屏内联导航共用关闭策略，点击频道可能在宽屏下误收起侧栏，或在窄屏下无法关闭全屏抽屉。
      - 输入框 focus 态若重新引入强边框，会破坏暗色 composer 的安静层级并制造不必要的视觉噪音。
      - 输入框底部 action 若混用不同 enabled 颜色，用户会误解部分按钮被禁用或处于不同优先级。
      - 标题区子区切换与右上角管理菜单职责若混淆，可能导致用户误触或切换不可达。
      - 频道重命名与新建时若未统一大小写/空白策略，可能出现“看似重复”名称并影响切换。
      - 异步路由（如 OpenClaw）与默认路由混用时，若排序键选错（例如把可变写入游标当作时间序）可能导致历史消息时序错乱。
      - 当多条消息 createdAt 相同且缺少 seqId/稳定并列键时，可能出现“新消息插到旧消息上方”的顺序抖动。
      - 当 writeSeq 与 seqId 语义混用，或 createdAt 来自不同时区来源时，会出现“回复跑到提问前”的错位。
      - user 气泡投递状态若未按路由类型区分（default/openclaw/其他远端），会导致状态图标误导用户。
      - 若 default `/chat/respond` 回退为同步阻塞路径，会导致“先入库再异步回复”契约失效并放大接口延迟。
      - 若 dispatch 占位与真实 assistant 正文未复用同一 `messageId`/合并链路，可能出现重复头像行或占位残留。
      - 若 dispatch 占位被渲染成普通空 assistant 气泡，用户会误判 AI 已经输出正文并干扰两段状态图标语义。
      - 若前端回退到“全量重放 upsert”，会再次引入 write_seq 噪声推进与重复写入风险。
      - channel 会话若错误暴露 thread 路由菜单，用户可能误写 thread scope 配置并造成路由预期不一致。
      - 若未按路由动态切换输入框左下角动作按钮，可能出现默认路由缺少模型入口或 OpenClaw 无法快捷注入斜杠命令的问题。
      - 长轮询 waitMs 设置过高且缺少超时保护时，可能导致连接堆积并放大服务端资源占用。
      - 内建 Agent 与自定义 Agent 合并策略若处理不当，可能导致同名覆盖异常或列表顺序不稳定。
      - 若将 `@` 提及能力从输入框迁移到路由指示后未保持可点击与菜单项一致性，用户可能误解当前路由状态或无法切换目标 Agent。
      - 若侧边栏 Skills 分组默认折叠状态或空态文案不稳定，可能与后续真实技能列表接入产生认知偏差。
      - Agent 详情页“修改配置/发起对话”回调若未正确关闭抽屉与路由跳转，可能出现重复页面栈或会话 Agent 未更新。
      - OpenClaw `@` 菜单若使用错误 nodeId 查询 agents，会导致用户引用到其他节点的 Agent 或看到空列表。
      - 设置页返回后若未刷新节点列表，聊天页路由菜单可能继续显示过期节点名称或缺少新节点。
      - 若“回到最新消息”按钮显隐阈值或滚动目标设置不当，用户可能误判已到达最新消息或无法快速回到底部。
      - 若组件直接写死颜色或误用 `primary` 作为普通气泡背景，会破坏暗色信息层级并导致关键行动不突出。

