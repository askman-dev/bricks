purpose: >
  为人类测试员、AI 测试员与 AI 工程师提供“功能 -> 代码/文档/关键词”映射，
  用于影响面分析、回归测试设计与遗留逻辑清理。

index:
  - feature_id: auth_login
    capability: GitHub OAuth 登录
    code_index:
      - apps/mobile_chat_app/lib/features/auth/login_screen.dart
      - apps/mobile_chat_app/lib/features/auth/auth_service.dart
      - apps/mobile_chat_app/lib/features/auth/github_oauth.dart
      - apps/node_backend/src/routes/auth.ts
    doc_index:
      - docs/architecture.md
      - BUILD.md
    test_index:
      - apps/mobile_chat_app/test/auth_service_test.dart
      - apps/node_backend/src/routes/auth.test.ts
    keywords:
      - oauth
      - github
      - token
      - auth
      - callback
    change_risks:
      - Web 与移动端 token 回调分支行为不一致。
      - 登录成功后导航状态未同步。

  - feature_id: chat_session
    capability: 多 Agent 聊天会话与仲裁
    code_index:
      - apps/mobile_chat_app/lib/features/chat/chat_screen.dart
      - apps/mobile_chat_app/lib/features/chat/chat_arbitration.dart
      - apps/mobile_chat_app/lib/features/chat/chat_topology.dart
      - apps/mobile_chat_app/lib/features/chat/chat_task_protocol.dart
      - apps/mobile_chat_app/lib/features/chat/chat_history_api_service.dart
      - apps/mobile_chat_app/lib/features/chat/widgets/composer_bar.dart
      - apps/mobile_chat_app/lib/features/chat/widgets/message_list.dart
      - packages/design_system/lib/src/bricks_theme.dart
      - apps/node_backend/src/routes/chat.ts
      - apps/node_backend/src/services/chatAsyncTransportService.ts
      - apps/node_backend/src/llm/llm_service.ts
    doc_index:
      - docs/architecture.md
      - openspec/changes/multi-agent-participation/design.md
    test_index:
      - apps/mobile_chat_app/test/chat_arbitration_engine_test.dart
      - apps/mobile_chat_app/test/chat_topology_and_task_protocol_test.dart
      - apps/mobile_chat_app/test/chat_history_api_service_test.dart
      - apps/mobile_chat_app/test/message_list_test.dart
      - apps/mobile_chat_app/test/composer_bar_test.dart
      - apps/node_backend/src/services/chatAsyncTransportService.test.ts
    keywords:
      - chat
      - arbitration
      - topology
      - channel
      - session
      - history
      - auto-scroll
      - popup-menu
      - menu-animation
    change_risks:
      - 改动路由或拓扑后，消息分发链路中断。
      - 会话持久化字段升级时出现向后兼容问题。
      - 消息列表滚动锚点从“底部”改为“用户消息”后，若触发条件错误会导致上下文定位错位。
      - 长文本折叠状态与流式更新叠加时，可能出现按钮闪烁或展开状态丢失。
      - 菜单动画时长或曲线调整不当可能导致菜单响应突兀或视觉跳变。

  - feature_id: model_settings
    capability: 模型配置读写
    code_index:
      - apps/mobile_chat_app/lib/features/settings/model_settings_screen.dart
      - apps/mobile_chat_app/lib/features/settings/llm_config_service.dart
      - apps/node_backend/src/routes/config.ts
      - config/models.yaml
      - config/app.defaults.yaml
    doc_index:
      - docs/model_settings_plan.md
      - docs/architecture.md
      - docs/openclaw_pull_only_integration_dev_doc.md
    test_index:
      - apps/mobile_chat_app/test/model_settings_screen_test.dart
    keywords:
      - model
      - provider
      - is_default
      - config
      - save
      - copy
      - api key
      - api url
      - xiaolongxia token
      - openclaw token
    change_risks:
      - 字段格式变化导致保存后读取失败。
      - 后端默认模型与前端选择策略不一致。
      - token 颁发与平台鉴权策略不一致会导致远端插件无法连接。

