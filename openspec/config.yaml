schema: spec-driven
context: |
  Tech stack: Dart and Flutter monorepo managed with Melos.
  The app entry point lives in apps/mobile_chat_app and shared packages live in packages/.
  Validate repository changes from the repo root with `melos analyze` and `melos test`.
  Natural-language use case specs belong in `tests/usecases/<module-name>.yaml`.

